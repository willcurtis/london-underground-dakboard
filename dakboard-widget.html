<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>London Underground DAKboard Widget</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b1220;
        --panel: rgba(255, 255, 255, 0.08);
        --panel-strong: rgba(255, 255, 255, 0.14);
        --ink: #f8fafc;
        --muted: #cbd5e1;
        --good: #14a44d;
        --warning: #f59e0b;
        --bad: #ef4444;
        --unknown: #94a3b8;
        --gap: clamp(6px, 1.4vmin, 12px);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body.light {
        --bg: #f3f5f8;
        --panel: #ffffff;
        --panel-strong: #e8edf5;
        --ink: #111827;
        --muted: #5d6675;
      }

      body.transparent {
        --bg: transparent;
        background: transparent;
      }

      .widget {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: var(--gap);
        width: 100vw;
        height: 100dvh;
        padding: clamp(8px, 2vmin, 18px);
      }

      .widget.no-title {
        grid-template-rows: minmax(0, 1fr) auto;
      }

      .widget.no-meta {
        grid-template-rows: auto minmax(0, 1fr);
      }

      .widget.no-title.no-meta {
        grid-template-rows: minmax(0, 1fr);
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: var(--gap);
        min-width: 0;
      }

      h1 {
        margin: 0;
        color: inherit;
        font-size: clamp(1rem, 5.4vmin, 2.4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .summary {
        flex: 0 0 auto;
        border-radius: 999px;
        background: var(--panel-strong);
        padding: 0.42em 0.68em;
        color: var(--muted);
        font-size: clamp(0.68rem, 2.2vmin, 0.95rem);
        font-weight: 750;
        line-height: 1;
        white-space: nowrap;
      }

      .lines {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 210px), 1fr));
        grid-auto-rows: minmax(52px, 1fr);
        gap: var(--gap);
        min-height: 0;
        overflow: hidden;
      }

      body.list .lines {
        grid-template-columns: 1fr;
        grid-auto-rows: minmax(38px, 1fr);
      }

      .line {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        grid-template-rows: auto auto;
        gap: 4px 10px;
        align-content: center;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border-radius: 8px;
        background: var(--panel);
        padding: clamp(8px, 1.8vmin, 14px) clamp(10px, 2vmin, 16px)
          clamp(8px, 1.8vmin, 14px) clamp(18px, 3.2vmin, 28px);
      }

      .line::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: clamp(8px, 1.6vmin, 13px);
        background: var(--line-colour);
      }

      .name {
        min-width: 0;
        overflow: hidden;
        color: var(--ink);
        font-size: clamp(0.86rem, 3.1vmin, 1.28rem);
        font-weight: 850;
        line-height: 1.05;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status {
        justify-self: end;
        align-self: start;
        border-radius: 999px;
        background: var(--unknown);
        color: white;
        padding: 0.4em 0.6em;
        font-size: clamp(0.62rem, 2.1vmin, 0.82rem);
        font-weight: 850;
        line-height: 1;
        white-space: nowrap;
      }

      .status.good {
        background: var(--good);
      }

      .status.warning {
        background: var(--warning);
      }

      .status.bad {
        background: var(--bad);
      }

      .reason {
        grid-column: 1 / -1;
        min-width: 0;
        overflow: hidden;
        color: var(--muted);
        font-size: clamp(0.68rem, 2.1vmin, 0.86rem);
        line-height: 1.22;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .meta {
        display: flex;
        justify-content: space-between;
        gap: var(--gap);
        min-width: 0;
        color: var(--muted);
        font-size: clamp(0.62rem, 1.9vmin, 0.8rem);
        line-height: 1.1;
      }

      .meta span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .error {
        display: none;
        border-radius: 8px;
        background: rgba(239, 68, 68, 0.18);
        color: #fecaca;
        padding: 10px 12px;
        font-size: clamp(0.7rem, 2.2vmin, 0.9rem);
      }

      .error.visible {
        display: block;
      }

      .empty {
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: var(--panel);
        color: var(--muted);
        padding: 18px;
        text-align: center;
        font-size: clamp(0.82rem, 2.4vmin, 1rem);
      }

      @media (max-width: 360px), (max-height: 280px) {
        .widget {
          padding: 7px;
        }

        header {
          align-items: center;
        }

        h1 {
          font-size: 1rem;
        }

        .summary {
          display: none;
        }

        .line {
          border-radius: 6px;
          padding-top: 7px;
          padding-bottom: 7px;
        }

        .reason {
          display: none;
        }
      }
    </style>
  </head>
  <body class="list">
    <main class="widget" id="widget">
      <header id="title-row">
        <h1 id="title">Tube Status</h1>
        <span class="summary" id="summary">Loading...</span>
      </header>

      <section class="lines" id="lines" aria-live="polite"></section>

      <footer class="meta" id="meta">
        <span id="updated">Waiting for TfL...</span>
        <span>Live TfL data</span>
      </footer>
    </main>

    <script>
      const TFL_STATUS_URL = "https://api.tfl.gov.uk/Line/Mode/tube/Status";

      const LINES = [
        { id: "bakerloo", name: "Bakerloo", colour: "#B36305" },
        { id: "central", name: "Central", colour: "#E32017" },
        { id: "circle", name: "Circle", colour: "#FFD300" },
        { id: "district", name: "District", colour: "#00782A" },
        { id: "hammersmith-city", name: "Hammersmith & City", colour: "#F3A9BB" },
        { id: "jubilee", name: "Jubilee", colour: "#A0A5A9" },
        { id: "metropolitan", name: "Metropolitan", colour: "#9B0056" },
        { id: "northern", name: "Northern", colour: "#000000" },
        { id: "piccadilly", name: "Piccadilly", colour: "#003688" },
        { id: "victoria", name: "Victoria", colour: "#0098D4" },
        { id: "waterloo-city", name: "Waterloo & City", colour: "#95CDBA" },
      ];

      const params = new URLSearchParams(window.location.search);
      const widget = document.querySelector("#widget");
      const titleRow = document.querySelector("#title-row");
      const title = document.querySelector("#title");
      const summary = document.querySelector("#summary");
      const lineContainer = document.querySelector("#lines");
      const meta = document.querySelector("#meta");
      const updated = document.querySelector("#updated");
      const body = document.body;

      const config = {
        layout: params.get("layout") || "list",
        theme: params.get("theme") || "dark",
        show: params.get("show") || "all",
        refresh: Math.max(Number(params.get("refresh")) || 60, 30),
        title: params.get("title") !== "0",
        meta: params.get("meta") !== "0",
        lines: params.get("lines"),
      };

      body.classList.toggle("list", config.layout !== "grid");
      body.classList.toggle("light", config.theme === "light");
      body.classList.toggle("transparent", config.theme === "transparent");
      widget.classList.toggle("no-title", !config.title);
      widget.classList.toggle("no-meta", !config.meta);
      titleRow.hidden = !config.title;
      meta.hidden = !config.meta;
      title.textContent = params.get("heading") || "Tube Status";

      const requestedLines = config.lines
        ? new Set(config.lines.split(",").map((line) => line.trim()).filter(Boolean))
        : null;

      const selectedLines = requestedLines
        ? LINES.filter((line) => requestedLines.has(line.id))
        : LINES;

      function statusClass(severity) {
        if (severity >= 10) return "good";
        if (severity >= 6) return "warning";
        return "bad";
      }

      function sanitize(text) {
        const div = document.createElement("div");
        div.textContent = text ?? "";
        return div.innerHTML;
      }

      function shortReason(statusText, reason) {
        if (statusText === "Good Service") return "No current disruptions";
        return reason?.replace(/^[^:]+:\s*/, "").trim() || "See TfL for details";
      }

      function render(linesById = new Map()) {
        const enriched = selectedLines.map((line) => {
          const live = linesById.get(line.id);
          const lineStatus = live?.lineStatuses?.[0];
          return {
            ...line,
            statusText: lineStatus?.statusSeverityDescription ?? "Loading",
            severity: lineStatus?.statusSeverity,
            reason: lineStatus?.reason,
          };
        });

        const visibleLines =
          config.show === "issues"
            ? enriched.filter((line) => line.statusText !== "Good Service")
            : enriched;

        const issueCount = enriched.filter(
          (line) => line.statusText !== "Good Service" && line.statusText !== "Loading",
        ).length;
        summary.textContent =
          issueCount === 0 ? "All good" : `${issueCount} issue${issueCount === 1 ? "" : "s"}`;

        if (visibleLines.length === 0) {
          lineContainer.innerHTML = `<div class="empty">No current Tube disruptions reported by TfL.</div>`;
          return;
        }

        lineContainer.innerHTML = visibleLines.map((line) => {
          const tone =
            typeof line.severity === "number" ? statusClass(line.severity) : "";

          return `
            <article class="line" style="--line-colour: ${line.colour}">
              <div class="name">${sanitize(line.name)}</div>
              <div class="status ${tone}">${sanitize(line.statusText)}</div>
              <div class="reason">${sanitize(shortReason(line.statusText, line.reason))}</div>
            </article>
          `;
        }).join("");
      }

      async function loadStatuses() {
        try {
          const response = await fetch(TFL_STATUS_URL, {
            headers: { Accept: "application/json" },
          });

          if (!response.ok) {
            throw new Error(`TfL returned HTTP ${response.status}`);
          }

          const data = await response.json();
          const linesById = new Map(data.map((line) => [line.id, line]));
          render(linesById);
          updated.textContent = `Updated ${new Intl.DateTimeFormat("en-GB", {
            hour: "2-digit",
            minute: "2-digit",
          }).format(new Date())}`;
        } catch (error) {
          lineContainer.innerHTML = `<div class="error visible">Live TfL data unavailable. ${sanitize(error.message)}</div>`;
          summary.textContent = "Offline";
          updated.textContent = "TfL unavailable";
        }
      }

      render();
      loadStatuses();
      setInterval(loadStatuses, config.refresh * 1000);
    </script>
  </body>
</html>
